name: Publish Docker image

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  push_to_registry:
    name: Push Docker images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # All-in-one Image Steps
      - name: Extract metadata (tags, labels) for All-in-one Docker
        id: meta_all_in_one
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dsddet/brothersbit-all-in-one
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}

      - name: Build and push All-in-one Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Dockerfile.all-in-one
          push: true
          tags: ${{ steps.meta_all_in_one.outputs.tags }}
          labels: ${{ steps.meta_all_in_one.outputs.labels }}

      # Backend Image Steps
      - name: Extract metadata (tags, labels) for Backend Docker
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dsddet/brothersbit-backend
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      # Frontend Image Steps
      - name: Extract metadata (tags, labels) for Frontend Docker
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dsddet/brothersbit-frontend
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.ssr
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
