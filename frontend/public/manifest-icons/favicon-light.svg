<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <title>BrothersBit Favicon - Light</title>
  <!-- White rounded-rect background -->
  <rect width="48" height="48" rx="8" fill="#ffffff"/>
  <!-- Split rectangle icon centered (~28px wide x 28px tall, centered) -->
  <g transform="translate(10, 10)">
    <!-- Left half - medium blue -->
    <rect x="0" y="0" width="14" height="28" fill="#3b57be"/>
    <!-- Right half - bright cyan -->
    <rect x="14" y="0" width="14" height="28" fill="#247ebf"/>
  </g>
</svg>
