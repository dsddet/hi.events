<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="180" height="115" viewBox="0 0 180 115">
  <title>BrothersBit Logo Stacked - Dark</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');
    .logo-text { font-family: 'Outfit', sans-serif; font-weight: 800; letter-spacing: -0.02em; }
  </style>

  <!-- Icon centered above text (48x40) -->
  <g transform="translate(66, 20)">
    <!-- Left half - medium blue -->
    <rect x="0" y="0" width="24" height="40" rx="3" fill="#3b57be"/>
    <!-- Right half - bright cyan -->
    <rect x="24" y="0" width="24" height="40" rx="3" fill="#247ebf"/>
  </g>

  <!-- Text centered below icon -->
  <text x="90" y="95" class="logo-text" font-size="26" fill="#ffffff" text-anchor="middle">BROTHERS<tspan fill="#247ebf">BIT</tspan></text>
</svg>
