id: 69938
name: BrothersBit
environments:
  production:
    gateway-version: 2.0
    domain: api.events.brothersbit.com
    memory: 2048
    cli-memory: 512
    storage: brothersbit-assets-prod
    runtime: docker
    warm: 3
    cache: brothersbit-redis
    database: brothersbit-postgres
    queues:
      - brothersbit-queue-prod
      - brothersbit-webhook-queue-prod
    queue-memory: 1024
    queue-concurrency: 5
    concurrency: 100
    build:
      - 'composer install --no-dev'
      - 'php artisan optimize'
    deploy:
      - 'php artisan migrate --force'
  staging:
    gateway-version: 2.0
    domain: staging-api.events.brothersbit.com
    memory: 1024
    cli-memory: 512
    runtime: docker
    warm: 3
    cache: brothersbit-redis
    database: brothersbit-postgres
    queue:
      - brothersbit-queue-staging
      - brothersbit-webhook-queue-staging
    queue-memory: 1024
    queue-concurrency: 2
    concurrency: 100
    build:
      - 'composer install --no-dev'
      - 'php artisan optimize'
    deploy:
      - 'php artisan migrate --force'
